name: Deploy to Firebase on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      # GCP 認証（Hosting / Functions / Firestore rules 共通）
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_HOMEPAGE_6641D }}'
      # Hosting: フロントエンドのビルドとデプロイ
      - run: pnpm i && pnpm build
        env:
          VITE_GAS_URL: ${{ secrets.VITE_GAS_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_STRIPE_PAYMENT_LINK_MONTHLY_URL: ${{ secrets.VITE_STRIPE_PAYMENT_LINK_MONTHLY_URL }}
          VITE_STRIPE_PAYMENT_LINK_YEARLY_URL: ${{ secrets.VITE_STRIPE_PAYMENT_LINK_YEARLY_URL }}
          VITE_STRIPE_CUSTOMER_PORTAL_URL: ${{ secrets.VITE_STRIPE_CUSTOMER_PORTAL_URL }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_HOMEPAGE_6641D }}'
          channelId: live
          projectId: my-homepage-6641d
      # Functions + Firestore rules のデプロイ
      - run: pnpm -C functions install --frozen-lockfile && pnpm -C functions build
      - run: npm install -g firebase-tools
      - name: Debug - show service account & IAM bindings
        run: |
          cat "$GOOGLE_APPLICATION_CREDENTIALS" | python3 -c "import sys,json; d=json.load(sys.stdin); print('SA:', d.get('client_email','UNKNOWN')); print('Project:', d.get('project_id','UNKNOWN'))"
          echo "---"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS"
          echo "GCLOUD_PROJECT=${GCLOUD_PROJECT:-not set}"
          echo "CLOUDSDK_CORE_PROJECT=${CLOUDSDK_CORE_PROJECT:-not set}"
          echo "---"
          gcloud auth list 2>/dev/null || echo "gcloud not available"
          echo "---"
          firebase projects:list --json 2>/dev/null | head -20 || echo "firebase projects:list failed"
      - run: firebase deploy --only functions,firestore --project my-homepage-6641d --debug
