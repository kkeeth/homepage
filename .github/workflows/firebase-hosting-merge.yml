name: Deploy to Firebase on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # WIF 認証に必須
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # 1. セットアップ
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.19.0'
          cache: 'pnpm'

      # 2. Google Cloud 認証 (WIF)
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      # 3. 依存関係のインストールとフロントエンドのビルド
      - name: Install and Build Frontend
        run: pnpm i --frozen-lockfile && pnpm build
        env:
          VITE_GAS_URL: ${{ secrets.VITE_GAS_URL }}
          VITE_RSS_URL: https://premium-feed.zensin0082.workers.dev/rss

      # 4. Firebase デプロイ (Hosting, Firestore のみ。Webhook は Cloudflare Worker が担当)
      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting,firestore --project my-homepage-6641d --force
        env:
          # auth ステップで生成された ADC (Application Default Credentials) を使用
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
