name: Deploy to Firebase on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # WIF 認証に必須
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # 1. セットアップ
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.19.0'
          cache: 'pnpm'

      # 2. Google Cloud 認証 (WIF)
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      # 3. 依存関係のインストールとフロントエンドのビルド
      - name: Install and Build Frontend
        run: pnpm i && pnpm build
        env:
          VITE_GAS_URL: ${{ secrets.VITE_GAS_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_STRIPE_PAYMENT_LINK_MONTHLY_URL: ${{ secrets.VITE_STRIPE_PAYMENT_LINK_MONTHLY_URL }}
          VITE_STRIPE_PAYMENT_LINK_YEARLY_URL: ${{ secrets.VITE_STRIPE_PAYMENT_LINK_YEARLY_URL }}
          VITE_STRIPE_CUSTOMER_PORTAL_URL: ${{ secrets.VITE_STRIPE_CUSTOMER_PORTAL_URL }}
          VITE_WORKER_BASE_URL: ${{ secrets.VITE_WORKER_BASE_URL }}

      # 4. Functions のビルド
      - name: Build Functions
        run: pnpm -C functions install --frozen-lockfile && pnpm -C functions build

      # 5. Firebase 一括デプロイ (Hosting, Functions, Firestore)
      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting,functions,firestore --project my-homepage-6641d --force
        env:
          # auth ステップで生成された ADC (Application Default Credentials) を使用
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
